<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta
      name="description"
      content="Medical Diagnosis Expert System - AI-powered symptom checker and disease diagnosis"
    />
    <meta name="keywords" content="medical diagnosis, AI healthcare, symptom checker, disease detection">
    <meta name="author" content="MediExpert">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="MediExpert - AI Medical Diagnosis System">
    <meta property="og:description" content="Intelligent medical diagnosis using AI and expert systems">
    <meta property="og:type" content="website">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>MediExpert - AI Medical Diagnosis System</title>
    
    <!-- Preload critical assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      /* Simple loading indicator while React loads */
      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      }
      
      .loading-spinner {
        text-align: center;
        color: white;
      }
      
      .loading-spinner .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-spinner h2 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      
      .loading-spinner p {
        font-size: 0.875rem;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Loading indicator while React is loading -->
      <div class="loading-container">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <h2>MediExpert</h2>
          <p>Loading AI Medical Diagnosis System...</p>
        </div>
      </div>
    </div>

    -->
  </body>
</html>
